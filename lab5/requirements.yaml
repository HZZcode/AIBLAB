# 先运行`conda env create -f requirements.yaml`，`conda activate rnn_1`
# 然后`pip install torch==2.7.1 torchvision==0.22.1 torchaudio==2.7.1 --index-url https://download.pytorch.org/whl/cu128`
name: rnn_1
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - soundfile=0.13.1
  - librosa=0.11.0
  - numpy
  - matplotlib
  - jupyter
  - pip